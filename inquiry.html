<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>

    <header>
           <nav>
               <div class="logo">CANSA</div>
               <ul>
                  <li><a href="index.html">Home</a></li>
                  <li><a href="about.html">About Us</a></li>
                  <li><a href="services.html">Services</a></li>
                  <li><a href="contact.html">Contact</a></li>
               </ul>
            </nav>
    </header>

    <div class="container">
    <h1> Registration Form: </h1>

    <form>
        <label for="fname">First Name:</label><br>
        <input type="text" id="fname" name="fname"><br>
        <label for="lname">Last Nmae:</label><br>
        <input type="text" id="lname" name="lnam"><br><br>
        <input type="submit" value="Submit" class="button">
    </form>

    <h2> Donation Form:</h2>

    <form action="/submit_donation" method="post">

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="amount">Donation Amount (Rand):</label><br>
        <input type="number" id="amount" name="amount" min="1" step="0.01" required><br><br>

        <label for="type">Donation Type:</label><br>
        <select id="type" name="type" required>
            <option value="">--Select--</option>
            <option value="one-time">One-Time</option>
            <option value="monthly">Monthly</option>
        </select><br><br>

        <label for="message">Message (Optional):</label><br>
        <textarea id="message" name="message" rows="4" cols="40"></textarea><br><br>

        <input type="submit" value="Donate" class="button">
    </form>
    </div>

    <footer>
        <p>&copy; 2026 CANSA</p>
    </footer>
    
</body>
</html>
