<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
    <meta name = "keywords" content = "CANSA, cancer awareness, cancer support, donations, South Africa, non-profit">
    <meta name = "description" content = "CANSA is a non-profit organization dedicated to cancer awareness, support, education and research in South Africa.">
    <link rel = "stylesheet" type = "text/css" href = "./CSS/Style.css">
    <title>CANSA (Cancer Assosiation of South Africa) | Inquiry</title>
    <script src = "https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

    <header>
           <nav>
               <div class = "logo">CANSA</div>
               <ul>
                  <li><a href = "index.html">Home</a></li>
                  <li><a href = "about.html">About Us</a></li>
                  <li><a href = "services.html">Services</a></li>
                  <li><a href = "contact.html">Contact</a></li>
               </ul>
            </nav>
    </header>

    <div class = "container">
    <h1> Registration Form: </h1>

    <form id = "contactForm">
        <label for = "fname">First Name:</label><br>
        <input type = "text" id = "fname" name = "fname" required><br>
        <label for = "lname">Last Name:</label><br>
        <input type = "text" id = "lname" name = "lname" required><br><br>
        <input type = "submit" value = "Submit" class = "button">
    </form>

    <h2> Donation Form:</h2>

    <form action = "/submit_donation" method = "post" id = "donationForm">

        <label for = "email">Email Address:</label><br>
        <input type = "email" id = "email" name = "email" required><br><br>

        <label for = "amount">Donation Amount (Rand):</label><br>
        <input type = "number" id = "amount" name = "amount" min = "1" step = "0.01" required><br><br>

        <label for = "type">Donation Type:</label><br>
        <select id = "type" name = "type" required>
            <option value = "">--Select--</option>
            <option value = "one-time">One-Time</option>
            <option value = "monthly">Monthly</option>
        </select><br><br>

        <label for = "message">Message (Optional):</label><br>
        <textarea id = "message" name = "message" rows = "4" cols = "40"></textarea><br><br>

        <input type="submit" value="Donate" class="button">
    </form>
    </div>

    <button id = "topBtn">Top</button>

    <div id = "contentArea">
        <p> Click the button for more information. </p>
    </div>
    <button id = "infoBtn"> Learn More </button>

    <footer>
        <p>&copy; <span id = "year"></span> CANSA</p>
    </footer>

<script src = "script.js"></script>
</body>
</html>
